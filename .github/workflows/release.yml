name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Reuse the exact Dockerized build the project uses locally, so release
      # artifacts are byte-for-byte the same pipeline. VERSION comes from the
      # tag and is stamped into the binary via -ldflags.
      - name: Build cross-platform binaries
        run: ./scripts/build.sh
        env:
          VERSION: ${{ github.ref_name }}

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
