# Configuration for GitHub's auto-generated release notes. Merged PRs are
# grouped into these categories by label; the catch-all must stay last.
changelog:
  exclude:
    labels:
      - no-release-note
  categories:
    - title: Features
      labels:
        - feature
        - enhancement
    - title: Bug Fixes
      labels:
        - bug
        - fix
    - title: Documentation
      labels:
        - documentation
        - docs
    - title: Other Changes
      labels:
        - "*"
